site_name: Tessera
site_description: A payment sidecar that adds per-second nanopayments to any self-hosted platform.
repo_url: https://github.com/JaDi03/tessera
repo_name: JaDi03/tessera

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    # Default to slate (dark mode)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Light mode option
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.select
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JaDi03/tessera
  generator: false

copyright: Copyright &copy; 2026 Tessera Contributors. Licensed under Apache-2.0.

nav:
  - Home: index.md
  - Architecture & Fees: ARCHITECTURE.md
  - Payment Models: payment-models.md
  - Getting Started: getting-started/index.md
  - Integrated Platforms:
    - Owncast:
      - Overview: platforms/owncast/index.md
      - Managing Creators: platforms/owncast/managing-creators.md
      - Monitoring: platforms/owncast/monitoring.md
      - Withdrawals: platforms/owncast/withdrawals.md
    - PeerTube:
      - Overview: platforms/peertube/index.md
      - Managing Creators: platforms/peertube/managing-creators.md
      - Monitoring: platforms/peertube/monitoring.md
      - Withdrawals: platforms/peertube/withdrawals.md
  - Tutorials:
    - Circle API Key: tutorials/circle-api-key.md
    - Circle App ID: tutorials/circle-app-id.md
    - Viewer Wallet Setup: tutorials/viewer-wallet.md
  - Connectors:
    - Overview: connectors/index.md
    - Building a Connector: connectors/building-a-connector.md

extra_css:
  - stylesheets/extra.css
